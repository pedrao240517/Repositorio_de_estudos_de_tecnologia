<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Mídias em HTML5</title>
</head>
<body>
    <h1> imagem dinâmica</h1>
    <p>tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente ou diminue o tamnaho deo seu navegador.</p>

    <picture>
        <source media="(max-width: 750px )" srcset="imagens/fotop.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagens/fotom.png" type="image/png">
        <img src="imagens/fotog.png" alt="imagem flexivel">
    </picture>
    <h1>Reproduzindo aúdio</h1>
    <p>Vamos ver como reproduzir um audio</p>
    <audio preload="metadata" autoplay controls >
        <source src="media/guanacast-33 (1).mp3" type="audio/mpeg" >
        <source src="media/Bad Memory (feat. Devyn Rush) - Blue Deer.ogg" type="">
        <source src="media/guanacast-33 (1).wav" type="">
        <p>Seu navegador não consegue reproduzir aúdio,<a href="media/guanacast-33 (1).mp3">clique aqui pra baixar o arquivo MP3</a></p>
    </audio>
    <!--- MP3  WAV OGG --->
    


</body>
</html>
